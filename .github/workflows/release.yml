name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package StayAwake
        run: ./scripts/package.sh
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/StayAwake-mac-arm64.zip
            dist/StayAwake-mac-arm64.pkg
            dist/stayawake-manifest.json
            dist/install-stayawake.sh
